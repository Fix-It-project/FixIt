name: Deploy Server (main)

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-server.yml"
      - ".github/workflows/server-pr-check.yml"
      - ".github/workflows/release-please.yml"
  workflow_dispatch:

concurrency:
  group: deploy-server-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Validate required server env
        run: |
          missing=0
          for name in \
            API_PUBLIC_URL \
            PAYMOB_API_KEY \
            PAYMOB_SECRET_KEY \
            PAYMOB_PUBLIC_KEY \
            PAYMOB_INTEGRATION_ID \
            PAYMOB_IFRAME_ID \
            PAYMOB_HMAC_SECRET \
            PAYMOB_BASE_URL \
            PAYMOB_IFRAME_BASE_URL \
            PAYMOB_UNIFIED_CHECKOUT_URL \
            PAYMOB_CURRENCY \
            PAYMOB_PLATFORM_FEE_PERCENT \
            PAYMOB_SANDBOX_MODE \
            LIFECYCLE_SMOKE_AUTO_COMPLETE
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required"
              missing=1
            fi
          done
          exit "$missing"
        env:
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
          PAYMOB_API_KEY: ${{ secrets.PAYMOB_API_KEY }}
          PAYMOB_SECRET_KEY: ${{ secrets.PAYMOB_SECRET_KEY }}
          PAYMOB_PUBLIC_KEY: ${{ secrets.PAYMOB_PUBLIC_KEY }}
          PAYMOB_INTEGRATION_ID: ${{ secrets.PAYMOB_INTEGRATION_ID }}
          PAYMOB_IFRAME_ID: ${{ secrets.PAYMOB_IFRAME_ID }}
          PAYMOB_HMAC_SECRET: ${{ secrets.PAYMOB_HMAC_SECRET }}
          PAYMOB_BASE_URL: ${{ secrets.PAYMOB_BASE_URL }}
          PAYMOB_IFRAME_BASE_URL: ${{ secrets.PAYMOB_IFRAME_BASE_URL }}
          PAYMOB_UNIFIED_CHECKOUT_URL: ${{ secrets.PAYMOB_UNIFIED_CHECKOUT_URL }}
          PAYMOB_CURRENCY: ${{ secrets.PAYMOB_CURRENCY }}
          PAYMOB_PLATFORM_FEE_PERCENT: ${{ secrets.PAYMOB_PLATFORM_FEE_PERCENT }}
          PAYMOB_SANDBOX_MODE: ${{ secrets.PAYMOB_SANDBOX_MODE }}
          LIFECYCLE_SMOKE_AUTO_COMPLETE: ${{ secrets.LIFECYCLE_SMOKE_AUTO_COMPLETE }}

      - name: Package check (serverless)
        run: pnpm --dir apps/server exec serverless package
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          ORDER_BUCKET: ${{ secrets.ORDER_BUCKET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          ADMIN_SESSION_TTL_SECONDS: ${{ secrets.ADMIN_SESSION_TTL_SECONDS }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
          PAYMOB_API_KEY: ${{ secrets.PAYMOB_API_KEY }}
          PAYMOB_SECRET_KEY: ${{ secrets.PAYMOB_SECRET_KEY }}
          PAYMOB_PUBLIC_KEY: ${{ secrets.PAYMOB_PUBLIC_KEY }}
          PAYMOB_INTEGRATION_ID: ${{ secrets.PAYMOB_INTEGRATION_ID }}
          PAYMOB_IFRAME_ID: ${{ secrets.PAYMOB_IFRAME_ID }}
          PAYMOB_HMAC_SECRET: ${{ secrets.PAYMOB_HMAC_SECRET }}
          PAYMOB_BASE_URL: ${{ secrets.PAYMOB_BASE_URL }}
          PAYMOB_IFRAME_BASE_URL: ${{ secrets.PAYMOB_IFRAME_BASE_URL }}
          PAYMOB_UNIFIED_CHECKOUT_URL: ${{ secrets.PAYMOB_UNIFIED_CHECKOUT_URL }}
          PAYMOB_CURRENCY: ${{ secrets.PAYMOB_CURRENCY }}
          PAYMOB_PLATFORM_FEE_PERCENT: ${{ secrets.PAYMOB_PLATFORM_FEE_PERCENT }}
          PAYMOB_SANDBOX_MODE: ${{ secrets.PAYMOB_SANDBOX_MODE }}
          LIFECYCLE_SMOKE_AUTO_COMPLETE: ${{ secrets.LIFECYCLE_SMOKE_AUTO_COMPLETE }}

      - name: Deploy with Serverless
        run: pnpm --dir apps/server exec serverless deploy
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          ORDER_BUCKET: ${{ secrets.ORDER_BUCKET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          ADMIN_SESSION_TTL_SECONDS: ${{ secrets.ADMIN_SESSION_TTL_SECONDS }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
          PAYMOB_API_KEY: ${{ secrets.PAYMOB_API_KEY }}
          PAYMOB_SECRET_KEY: ${{ secrets.PAYMOB_SECRET_KEY }}
          PAYMOB_PUBLIC_KEY: ${{ secrets.PAYMOB_PUBLIC_KEY }}
          PAYMOB_INTEGRATION_ID: ${{ secrets.PAYMOB_INTEGRATION_ID }}
          PAYMOB_IFRAME_ID: ${{ secrets.PAYMOB_IFRAME_ID }}
          PAYMOB_HMAC_SECRET: ${{ secrets.PAYMOB_HMAC_SECRET }}
          PAYMOB_BASE_URL: ${{ secrets.PAYMOB_BASE_URL }}
          PAYMOB_IFRAME_BASE_URL: ${{ secrets.PAYMOB_IFRAME_BASE_URL }}
          PAYMOB_UNIFIED_CHECKOUT_URL: ${{ secrets.PAYMOB_UNIFIED_CHECKOUT_URL }}
          PAYMOB_CURRENCY: ${{ secrets.PAYMOB_CURRENCY }}
          PAYMOB_PLATFORM_FEE_PERCENT: ${{ secrets.PAYMOB_PLATFORM_FEE_PERCENT }}
          PAYMOB_SANDBOX_MODE: ${{ secrets.PAYMOB_SANDBOX_MODE }}
          LIFECYCLE_SMOKE_AUTO_COMPLETE: ${{ secrets.LIFECYCLE_SMOKE_AUTO_COMPLETE }}
