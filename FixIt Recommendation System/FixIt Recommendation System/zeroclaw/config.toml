schema_version = 3

[providers.models.ollama.default]
model = "gemma3:4b"
temperature = 0.1
num_ctx = 12288
timeout_secs = 180

[agents.default]
model_provider = "ollama.default"
risk_profile = "default"
runtime_profile = "default"

[risk_profiles.default]
level = "full"
workspace_only = false
allowed_tools = ["get_technician_recommendation"]
allowed_commands = ["curl"]
block_high_risk_commands = false
require_approval_for_medium_risk = false

[runtime_profiles.default]
compact_context = true
max_actions_per_hour = 100
max_cost_per_day_cents = 0
max_history_messages = 10
max_tool_iterations = 5

[gateway]
host = "0.0.0.0"
port = 3000
require_pairing = false
allow_public_bind = true
max_request_body_bytes = 52428800

[pacing]
step_timeout_secs               = 180
loop_detection_min_elapsed_secs = 60
message_timeout_scale_max       = 6

[http_request]
enabled              = true
allowed_domains      = ["*"]
max_response_size    = 1000000
timeout_secs         = 30
allow_private_hosts  = true
allowed_private_hosts = ["fixit-api"]

[shell_tool]
timeout_secs = 30

[multimodal]
max_images         = 4
max_image_size_mb  = 20
allow_remote_fetch = false

[runtime]
reasoning_enabled = false

[skills]
open_skills_enabled   = false
allow_scripts         = false
prompt_injection_mode = "full"

[memory]
backend   = "sqlite"
auto_save = false

[reliability]
provider_retries    = 2
provider_backoff_ms = 500

[observability]
backend                  = "log"
runtime_trace_mode       = "rolling"
runtime_trace_max_entries = 100
