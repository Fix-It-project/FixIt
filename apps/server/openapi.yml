openapi: 3.0.3
info:
  title: FixIt API
  version: 1.1.0
  description: >
    OpenAPI description for the current FixIt Express API surface. This file is
    aligned to the mounted routes in `src/app.ts`, current module route files,
    and the available module READMEs.

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://d25l1nu40gf2i5.cloudfront.net/api
    description: Production (CloudFront)

tags:
  - name: Admin Auth
  - name: Admin Dashboard
  - name: Admin Orders
  - name: Admin Homeowners
  - name: Admin Technicians
  - name: Admin Service Requests
  - name: Admin Reports
  - name: Auth
  - name: Technician Auth
  - name: Users
  - name: Addresses
  - name: Categories
  - name: Services
  - name: Technicians
  - name: Technician Calendar
  - name: Orders
  - name: Order Reschedule
  - name: Order Lifecycle
  - name: Reviews
  - name: Notifications
  - name: Reports
  - name: Custom Services

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AddressId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TechnicianId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CalendarTechnicianId:
      name: technicianId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CalendarEntryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuoteId:
      name: quoteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CustomServiceRequestId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Range:
      name: range
      in: query
      schema:
        type: string
        enum: [7d, 30d, 90d]
        default: 30d
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:
    GenericObject:
      type: object
      additionalProperties: true

    Problem:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        token:
          type: string
        userMessage:
          type: string
        fields:
          type: object
          additionalProperties: true

    Session:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: integer

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time

    Technician:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        category_id:
          type: string
          format: uuid
        is_available:
          type: boolean
        description:
          type: string

    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
        city:
          type: string
        street:
          type: string
        building_no:
          type: string
        apartment_no:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time

    Service:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        min_price:
          type: integer
        max_price:
          type: integer
        category_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        reviewer_name:
          type: string
        created_at:
          type: string
          format: date-time

    NotificationPreference:
      type: object
      properties:
        notifications_enabled:
          type: boolean
        sound_enabled:
          type: boolean
        vibration_enabled:
          type: boolean

    CalendarTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        technician_id:
          type: string
          format: uuid
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
        slot_hour:
          type: integer
          enum: [8, 11, 14, 17, 20]
        active:
          type: boolean

    CalendarException:
      type: object
      properties:
        id:
          type: string
          format: uuid
        technician_id:
          type: string
          format: uuid
        date:
          type: string
          format: date

    CustomServiceRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        technician_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        min_price:
          type: integer
        max_price:
          type: integer
        status:
          type: string
        reason:
          type: string

    Report:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        source:
          type: string
          enum: [user, technician]
        label:
          type: string
        summary:
          type: string
        status:
          type: string

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        technician_id:
          type: string
          format: uuid
        service_id:
          type: string
          format: uuid
        status:
          type: string
        scheduled_date:
          type: string
          format: date
        scheduled_start_at:
          type: string
          format: date-time
        payment_method:
          type: string
          enum: [cash, card]
        problem_description:
          type: string
        destination_address_id:
          type: string
          format: uuid
        final_price:
          type: integer

paths:
  /admin/auth/login:
    post:
      tags: [Admin Auth]
      summary: Sign in as admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Admin login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "400":
          description: Validation error

  /admin/auth/logout:
    post:
      tags: [Admin Auth]
      summary: Sign out the current admin session
      responses:
        "200":
          description: Admin logout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"

  /admin/auth/me:
    get:
      tags: [Admin Auth]
      summary: Get the current admin
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"

  /admin/dashboard/summary:
    get:
      tags: [Admin Dashboard]
      summary: Get admin dashboard summary cards and aggregates
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/dashboard/orders-series:
    get:
      tags: [Admin Dashboard]
      summary: Get orders time-series for the selected range
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Orders series
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GenericObject"

  /admin/orders:
    get:
      tags: [Admin Orders]
      summary: List orders for the admin dashboard
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, accepted, active, completed, cancelled]
            default: all
        - name: search
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            enum: [all, today, 7d, 30d, 90d]
            default: all
        - name: amount
          in: query
          schema:
            type: string
            enum: [all, lt100, 100_500, 500_1000, gt1000]
            default: all
      responses:
        "200":
          description: Paginated admin orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GenericObject"
                  total:
                    type: integer
                  counts:
                    $ref: "#/components/schemas/GenericObject"

  /admin/orders/export:
    get:
      tags: [Admin Orders]
      summary: Export admin order data for the selected filter set
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, accepted, active, completed, cancelled]
        - name: search
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            enum: [all, today, 7d, 30d, 90d]
        - name: amount
          in: query
          schema:
            type: string
            enum: [all, lt100, 100_500, 500_1000, gt1000]
      responses:
        "200":
          description: Exported order rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GenericObject"

  /admin/orders/{id}:
    get:
      tags: [Admin Orders]
      summary: Get one admin order detail record
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/homeowners:
    get:
      tags: [Admin Homeowners]
      summary: List homeowners for the admin dashboard
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Homeowners list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GenericObject"

  /admin/homeowners/{id}/history:
    get:
      tags: [Admin Homeowners]
      summary: Get homeowner order and account history
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Homeowner history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/homeowners/{id}/block:
    patch:
      tags: [Admin Homeowners]
      summary: Block a homeowner account
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Updated homeowner record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/homeowners/{id}/unblock:
    patch:
      tags: [Admin Homeowners]
      summary: Unblock a homeowner account
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated homeowner record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/technicians:
    get:
      tags: [Admin Technicians]
      summary: List technicians for the admin dashboard
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Technicians list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GenericObject"

  /admin/technicians/{id}/history:
    get:
      tags: [Admin Technicians]
      summary: Get technician account and order history
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TechnicianId"
      responses:
        "200":
          description: Technician history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/technicians/{id}/verify:
    patch:
      tags: [Admin Technicians]
      summary: Verify a technician application
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TechnicianId"
      responses:
        "200":
          description: Updated technician record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/technicians/{id}/reject:
    patch:
      tags: [Admin Technicians]
      summary: Reject a technician application
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TechnicianId"
      responses:
        "200":
          description: Updated technician record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/technicians/{id}/block:
    patch:
      tags: [Admin Technicians]
      summary: Block a technician account
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TechnicianId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Updated technician record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/technicians/{id}/unblock:
    patch:
      tags: [Admin Technicians]
      summary: Unblock a technician account
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TechnicianId"
      responses:
        "200":
          description: Updated technician record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenericObject"

  /admin/service-requests:
    get:
      tags: [Admin Service Requests]
      summary: List technician custom-service requests for admin review
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, decided]
            default: pending
      responses:
        "200":
          description: Paginated service-request queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomServiceRequest"
                  total:
                    type: integer
                  counts:
                    $ref: "#/components/schemas/GenericObject"

  /admin/service-requests/{id}/approve:
    patch:
      tags: [Admin Service Requests]
      summary: Approve a technician custom-service request
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomServiceRequestId"
      responses:
        "200":
          description: Approved request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CustomServiceRequest"

  /admin/service-requests/{id}/reject:
    patch:
      tags: [Admin Service Requests]
      summary: Reject a technician custom-service request
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomServiceRequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Rejected request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CustomServiceRequest"

  /admin/reports:
    get:
      tags: [Admin Reports]
      summary: List user and technician reports for moderation
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed]
            default: open
        - name: source
          in: query
          schema:
            type: string
            enum: [all, user, technician]
            default: all
      responses:
        "200":
          description: Paginated reports queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Report"
                  total:
                    type: integer
                  counts:
                    $ref: "#/components/schemas/GenericObject"

  /admin/reports/{id}/resolve:
    patch:
      tags: [Admin Reports]
      summary: Resolve a report
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"

  /admin/reports/{id}/dismiss:
    patch:
      tags: [Admin Reports]
      summary: Dismiss a report
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"

  /admin/reports/{id}/reopen:
    patch:
      tags: [Admin Reports]
      summary: Reopen a report
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"

  /admin/reports/{id}/warn:
    patch:
      tags: [Admin Reports]
      summary: Mark a report with a warning action
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"

  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, city, street]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                fullName:
                  type: string
                phone:
                  type: string
                address:
                  type: string
                city:
                  type: string
                street:
                  type: string
                building_no:
                  type: string
                apartment_no:
                  type: string
                latitude:
                  type: number
                  nullable: true
                longitude:
                  type: number
                  nullable: true
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                        format: email
                  message:
                    type: string

  /auth/signin:
    post:
      tags: [Auth]
      summary: Sign in as a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: User session
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                        format: email
                  session:
                    $ref: "#/components/schemas/Session"

  /auth/signout:
    post:
      tags: [Auth]
      summary: Sign out the current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Signout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user from the current token
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"

  /auth/oauth/status:
    get:
      tags: [Auth]
      summary: Get OAuth onboarding status for the current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OAuth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"

  /auth/oauth/complete:
    post:
      tags: [Auth]
      summary: Complete an OAuth-created user profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [city, street]
              properties:
                fullName:
                  type: string
                phone:
                  type: string
                city:
                  type: string
                street:
                  type: string
                building_no:
                  type: string
                apartment_no:
                  type: string
                latitude:
                  type: number
                  nullable: true
                longitude:
                  type: number
                  nullable: true
      responses:
        "201":
