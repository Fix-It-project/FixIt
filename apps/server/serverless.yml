# "service" is the name of this project. This will also be added to your AWS resource names.
service: FixIt

plugins:
  - serverless-plugin-warmup

build:
  esbuild:
    banner:
      js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
    bundle: true
    format: esm
    platform: node
    target: node24
    external:
      - "@supabase/supabase-js"

package:
  individually: true

provider:
  name: aws
  runtime: nodejs24.x
  tracing:
    lambda: true
    apiGateway: true
  region: eu-west-3
  stage: dev
  environment:
    SUPABASE_URL: ${env:SUPABASE_URL}
    SUPABASE_ANON_KEY: ${env:SUPABASE_ANON_KEY}
    SUPABASE_CONNECTION_STRING: ${env:SUPABASE_CONNECTION_STRING}
    SUPABASE_SERVICE_ROLE_KEY: ${env:SUPABASE_SERVICE_ROLE_KEY}
    CORS_ORIGIN: ${env:CORS_ORIGIN}
    STORAGE_BUCKET: ${env:STORAGE_BUCKET}
    ORDER_BUCKET: ${env:ORDER_BUCKET}
    ADMIN_EMAIL: ${env:ADMIN_EMAIL}
    ADMIN_PASSWORD_HASH: ${env:ADMIN_PASSWORD_HASH}
    ADMIN_JWT_SECRET: ${env:ADMIN_JWT_SECRET}
    ADMIN_SESSION_TTL_SECONDS: ${env:ADMIN_SESSION_TTL_SECONDS}
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com

custom:
  warmup:
    default:
      enabled: false
      events:
        - schedule: rate(5 minutes)
      concurrency: 3
      prewarm: true
      verbose: false
      logRetentionInDays: 14
      payload:
        source: serverless-plugin-warmup

functions:
  adminAuth:
    handler: serverless-deploy/admin-auth-lambda.handler
    events:
      - http:
          path: api/admin/auth/{proxy+}
          method: any
          cors: true

  adminDashboard:
    handler: serverless-deploy/admin-dashboard-lambda.handler
    events:
      - http:
          path: api/admin/dashboard/{proxy+}
          method: any
          cors: true

  auth:
    handler: serverless-deploy/auth-lambda.handler
    warmup:
      default:
        enabled: prod
    events:
      - http:
          path: api/auth/{proxy+}
          method: any
          cors: true

  technicianAuth:
    handler: serverless-deploy/technician-auth-lambda.handler
    warmup:
      default:
        enabled: prod
    events:
      - http:
          path: api/technician-auth/{proxy+}
          method: any
          cors: true
  users:
    handler: serverless-deploy/users-lambda.handler
    events:
      - http:
          path: api/users/{proxy+}
          method: any

  technicians:
    handler: serverless-deploy/technicians-lambda.handler
    events:
      - http:
          path: api/technicians/{proxy+}
          method: any
          cors: true

  addresses:
    handler: serverless-deploy/addresses-lambda.handler
    events:
      - http:
          path: api/addresses/{proxy+}
          method: any
          cors: true
  categories:
    handler: serverless-deploy/categories-lambda.handler
    events:
      - http:
          path: api/categories/{proxy+}
          method: any
          cors: true

  technicianCalendar:
    handler: serverless-deploy/technician-calendar-lambda.handler
    warmup:
      default:
        enabled: prod
    events:
      - http:
          path: api/technician-calendar/{proxy+}
          method: any
          cors: true

  orders:
    handler: serverless-deploy/orders-lambda.handler
    warmup:
      default:
        enabled: prod
    events:
      - http:
          path: api/orders/{proxy+}
          method: any
          cors: true

  reviews:
    handler: serverless-deploy/reviews-lambda.handler
    events:
      - http:
          path: api/reviews/{proxy+}
          method: any
          cors: true

  notifications:
    handler: serverless-deploy/notifications-lambda.handler
    warmup:
      default:
        enabled: prod
    events:
      - http:
          path: api/notifications/{proxy+}
          method: any
          cors: true