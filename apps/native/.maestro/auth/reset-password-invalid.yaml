# Reset-password guard: opening the reset screen WITHOUT a valid recovery deep
# link (no access/refresh tokens in the fragment) must land on the invalid-link
# state, never the password form. Idempotent — no backend, no Supabase session.
appId: com.anonymous.fixitapp
---
- launchApp:
    clearState: true
- openLink: "fixitapp:///reset-password"
- assertVisible:
    text: "Invalid Link"
    timeout: 15000
- assertVisible:
    text: "Back to Login"
# The password form must NOT be reachable from an invalid link.
- assertNotVisible: "New password"
