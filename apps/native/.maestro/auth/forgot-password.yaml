# Forgot-password UI smoke: deep-link to the reset screen, enter an email, and
# submit. The post-submit "check your inbox" view depends on a real backend
# round-trip, so it is left as a commented assertion below.
appId: com.anonymous.fixitapp
---
- launchApp:
    clearState: true
- openLink: "fixitapp:///forgot-password"
- assertVisible:
    id: "forgot-email-input"
    timeout: 15000
- tapOn:
    id: "forgot-email-input"
- inputText: "user@fixit.dev"
- hideKeyboard
- assertVisible:
    id: "forgot-submit"
- tapOn:
    id: "forgot-submit"

# --- Requires a reachable backend that accepts the reset request -------------
